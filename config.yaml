# Project Configuration

data:
  raw_train: "data/raw/train.csv"
  raw_test: "data/raw/test.csv"
  processed_train: "data/processed/train_processed.csv"

model:
  test_size: 0.2
  random_state: 42
  max_features: 5000

preprocessing:
  remove_urls: true
  remove_mentions: true
  remove_hashtags: false
  lemmatize: true

urgency_keywords:
  critical: ["help", "trapped", "sos", "rescue", "dying", "emergency"]
  high: ["collapsed", "damage", "destroyed", "flood", "fire", "injured"]
  medium: ["need", "request", "shortage", "missing", "evacuate"]
  low: ["update", "report", "news", "information", "alert"]
